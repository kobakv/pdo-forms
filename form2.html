<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Патохарактерологічний опитувальник Лічка | Дослідження 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #E9E8E4;
            --deep-forest: #1A241D;
            --copper: #965935;
            --sage: #737E77;
            --shadow-color: rgba(26, 36, 29, 0.15);
            --inset-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--stone) 0%, #f5f3f0 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--deep-forest);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, var(--stone) 0%, #faf8f5 100%);
            border-bottom: 1px solid rgba(26,36,29,0.1);
            padding: 50px 40px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            background: var(--sage);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 18px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--deep-forest);
            line-height: 1.25;
        }
        .instruction-box {
            margin: 0 40px;
            padding: 20px 24px;
            background: rgba(115,126,119,0.08);
            border-left: 4px solid var(--sage);
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: var(--deep-forest);
            line-height: 1.6;
        }
        .instruction-box strong { color: var(--sage); }
        .content { padding: 40px; }
        .fields-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        .form-group label span { color: var(--copper); }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(26,36,29,0.12);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--deep-forest);
            background: rgba(233,232,228,0.4);
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--sage);
            background: white;
            box-shadow: 0 0 0 3px rgba(115,126,119,0.15);
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--deep-forest);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sage);
        }
        .theme {
            background: linear-gradient(135deg, rgba(233,232,228,0.5) 0%, rgba(115,126,119,0.03) 100%);
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--sage);
            box-shadow: var(--inset-shadow);
        }
        .theme.error-theme { border-left-color: #c0392b; background: rgba(192,57,43,0.04); }
        .theme-title {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--deep-forest);
            margin-bottom: 16px;
        }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .option:hover { background: rgba(233,232,228,0.6); }
        .option input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--sage);
            flex-shrink: 0;
        }
        .option label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            color: var(--deep-forest);
            font-size: 14px;
            line-height: 1.5;
        }
        .option input:disabled { opacity: 0.35; cursor: not-allowed; }
        .option input:disabled ~ label { opacity: 0.35; cursor: not-allowed; }
        .selected-count {
            font-size: 12px;
            color: var(--sage);
            margin-top: 10px;
            font-weight: 600;
        }
        .button-group { display: flex; gap: 15px; margin-top: 40px; }
        button {
            padding: 16px 40px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn-submit {
            background: var(--sage);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(115,126,119,0.25);
        }
        .btn-submit:hover { background: #5e6b62; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(115,126,119,0.35); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-reset {
            background: var(--stone);
            color: var(--deep-forest);
            border: 1px solid rgba(26,36,29,0.15);
            padding: 16px 30px;
        }
        .btn-reset:hover { background: #F5F3F0; }
        .error {
            background: rgba(192,57,43,0.08);
            color: #c0392b;
            padding: 14px 18px;
            border-left: 4px solid #c0392b;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .error.show { display: block; }
        .success-box {
            display: none;
            background: rgba(26,36,29,0.05);
            border: 2px solid var(--deep-forest);
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        .success-box.show { display: block; }
        .success-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--deep-forest);
            margin-bottom: 10px;
        }
        .success-box p { color: var(--sage); font-size: 15px; }
        .result {
            display: none;
            background: rgba(233,232,228,0.6);
            border: 1px solid rgba(26,36,29,0.15);
            border-radius: 10px;
            padding: 20px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 13px;
            color: var(--deep-forest);
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        }
        .result.show { display: block; }
        .btn-copy {
            margin-top: 15px;
            background: var(--deep-forest);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-copy:hover { background: #2d3d2f; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="badge">Дослідження 2 · День 4</div>
        <h1>Патохарактерологічний діагностичний<br>опитувальник А. Лічка</h1>
    </header>

    <div class="instruction-box">
        Для кожної теми оберіть <strong>не більше трьох</strong> варіантів, які <strong>найменше Вам притаманні</strong>.
        Орієнтуйтесь на своє звичне відчуття, а не на теперішній момент. Усі 25 тем є обов'язковими.
    </div>

    <div class="content">
        <form id="pdo-form" novalidate>
            <div class="fields-row">
                <div class="form-group">
                    <label for="name">ПІБ <span>*</span></label>
                    <input type="text" id="name" required placeholder="Іван Петренко Миколайович">
                </div>
                <div class="form-group">
                    <label for="email">Email <span>*</span></label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
            </div>
            <div class="form-group" style="max-width: 300px;">
                <label for="dob">Дата народження <span>*</span></label>
                <input type="date" id="dob" required>
            </div>

            <div class="error" id="error-message"></div>

            <h2 class="section-title" style="margin-bottom: 25px; margin-top: 10px;">Теми</h2>
            <div id="themes-container"></div>

            <div class="button-group">
                <button type="reset" class="btn-reset" id="btn-reset">Очистити</button>
                <button type="submit" class="btn-submit" id="btn-submit">Надіслати результати</button>
            </div>

            <div class="success-box" id="success-box">
                <h3>Дякуємо!</h3>
                <p>Ваші відповіді збережено.</p>
                <div class="result" id="result"></div>
                <button class="btn-copy" onclick="copyResult()">Скопіювати результати</button>
            </div>
        </form>
    </div>
</div>

<script>
    let questionsData = {};

    fetch('pdo_questions.json')
        .then(r => r.json())
        .then(data => { questionsData = data; renderForm(); })
        .catch(e => showError('Помилка завантаження: ' + e));

    function renderForm() {
        const container = document.getElementById('themes-container');
        for (let n = 1; n <= 25; n++) {
            const theme = questionsData[n];
            if (!theme) continue;
            let html = `<div class="theme" id="theme-block-${n}">
                <div class="theme-title">Тема ${n}. ${theme.name}</div>
                <div class="options">`;
            theme.answers.forEach((answer, idx) => {
                const num = idx + 1;
                const id = `t${n}-a${num}`;
                html += `<div class="option">
                    <input type="checkbox" id="${id}" name="theme${n}" value="${num}">
                    <label for="${id}">${num}. ${answer}</label>
                </div>`;
            });
            html += `</div><div class="selected-count" id="count-theme${n}">Обрано: 0</div></div>`;
            container.innerHTML += html;
        }
        document.querySelectorAll('input[type="checkbox"]').forEach(cb =>
            cb.addEventListener('change', handleChange));
    }

    function handleChange(e) {
        const cb = e.target;
        const name = cb.name;
        const num = name.replace('theme', '');
        const checked = document.querySelectorAll(`input[name="${name}"]:checked`);
        const all = document.querySelectorAll(`input[name="${name}"]`);
        const count = checked.length;
        if (count > 3) { cb.checked = false; showError('Максимум 3 варіанти на одну тему!'); return; }
        all.forEach(x => { x.disabled = !x.checked && count === 3; });
        document.getElementById(`count-theme${num}`).textContent = `Обрано: ${count}`;
        document.getElementById(`theme-block-${num}`).classList.remove('error-theme');
        clearError();
    }

    function showError(msg) {
        const el = document.getElementById('error-message');
        el.innerHTML = msg;
        el.classList.add('show');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function clearError() {
        document.getElementById('error-message').classList.remove('show');
    }

    document.getElementById('pdo-form').addEventListener('submit', e => {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const dob = document.getElementById('dob').value;

        if (!name) { showError("Будь ласка, введіть ПІБ."); return; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError("Введіть коректний email."); return; }
        if (!dob) { showError("Введіть дату народження."); return; }

        // Validate all 25 themes filled
        const empty = [];
        for (let n = 1; n <= 25; n++) {
            const checked = document.querySelectorAll(`input[name="theme${n}"]:checked`);
            if (checked.length === 0) {
                empty.push(n);
                document.getElementById(`theme-block-${n}`).classList.add('error-theme');
            } else {
                document.getElementById(`theme-block-${n}`).classList.remove('error-theme');
            }
        }

        if (empty.length > 0) {
            showError(`Заповніть усі теми (не більше 3 відповіді на кожну).<br>Незаповнені теми: <strong>${empty.join(', ')}</strong>`);
            document.getElementById(`theme-block-${empty[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        const answers = {};
        for (let n = 1; n <= 25; n++) {
            answers[n] = Array.from(document.querySelectorAll(`input[name="theme${n}"]:checked`)).map(cb => cb.value);
        }

        let output = `=== ДОСЛІДЖЕННЯ 2 ===\nКлієнт: ${name}\nEmail: ${email}\nДата народження: ${dob}\n\n`;
        for (let i = 1; i <= 25; i++) {
            output += `Тема ${i}. ${questionsData[i].name}: ${answers[i].join(', ')}\n`;
        }

        document.getElementById('result').textContent = output;
        document.getElementById('result').classList.add('show');
        document.getElementById('success-box').classList.add('show');
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-reset').disabled = true;
        clearError();
    });

    function copyResult() {
        const text = document.getElementById('result').textContent;
        navigator.clipboard.writeText(text).then(() => {
            event.target.textContent = '✓ Скопійовано';
        });
    }
</script>
</body>
</html>
